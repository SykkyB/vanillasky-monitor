services:
  vanilla-sky-monitor:
    build: .
    image: vanilla-sky-monitor:local
    container_name: vanilla-sky-monitor
    restart: unless-stopped
    env_file: .env
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./config.yml:/app/config.yml:ro
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import os,time,sys; p='/app/data/heartbeat'; sys.exit(0 if os.path.exists(p) and time.time()-os.path.getmtime(p) < 900 else 1)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s

  vanilla-sky-redirect:
    build: ./redirect
    image: vanilla-sky-redirect:local
    container_name: vanilla-sky-redirect
    restart: unless-stopped
    networks: [proxy]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=2).status==200 else 1)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  proxy:
    external: true
